<!DOCTYPE html>
<html>
<head>
    <title>Subject Selection Form</title>
</head>
<body>
<h2>Fill The Form</h2>
<form>
  <label for="fname">First name:</label><br>
  <input type="text" id="fname" name="fname"><br><br>
  <label for="lname">Last name:</label><br>
  <input type="text" id="lname" name="lname"><br><br>
  <label for="Email">Email:</label><br>
  <input type="text" id="Email" name="Email"><br><br>
  
  <label for="courses">Choose a course:</label>
<select name="courses" id="courses" style="border: 1px solid black; padding: 1px;">
  <option value="daa">Design and Analysis of Algorithms</option>
  <option value="java">Java</option>
  <option value="math">Mathematics</option>
  <option value="fet">Front End Technologies</option>
</select><br><br>
<label for="bio">Tell us more about your Semester:</label><br>

<textarea id="bio"  rows="5" cols="50" placeholder="Type your description here..." style="border: 1px solid black; padding: 5px;">
</textarea>
  
</form>
</body>
</html>
